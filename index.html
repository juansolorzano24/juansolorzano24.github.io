<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Primer Mapa</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>

    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.css" />
</head>
<body>

    <div id="app">
        <div id="map"></div>

        <div id="resizeBar"></div>

        <div id="panelInferior">
            <div id="panelConsulta" class="panel-botones">
                <div class="panel-botones-header">Capas a consultar</div>
                <div class="panel-botones-body">
                    <label for="selectorCapa"><b>Capa a consultar:</b></label>
                    <select id="selectorCapa">
                        <option value="comunas">Comunas</option>
                        <option value="municipios">Municipios</option>
                    </select>

                    <button onclick="toggleDashboard()">Mostrar / Ocultar Dashboard</button>
                    <button onclick="toggleTabla()">Mostrar / Ocultar Tabla</button>
                </div>
            </div>

            <div id="dashboard" class="panel-info" style="display:none;">
                <div class="panel-header">Dashboard</div>
                <div class="panel-body" id="dashboardContenido"></div>
                <div class="resize-handle"></div>
            </div>

            <div id="tablaAtributos" class="panel-info" style="display:none;">
                <div class="panel-header">Tabla de atributos</div>
                <div class="panel-body" id="tablaContenido"></div>
                <div class="resize-handle"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>

    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet-measure/dist/leaflet-measure.js"></script>
    <script src="https://unpkg.com/leaflet.control.layers.tree/L.Control.Layers.Tree.js"></script>
    <script src="scripts.js"></script>

</body>
</html>
